<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bilheteria Virtual</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="BilheteriaVirtualBlazor.styles.css" rel="stylesheet" />
    <style>
        #loading-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.4s ease;
        }
        .loading-logo { font-size: 3rem; margin-bottom: 1rem; animation: pulse 1.5s ease-in-out infinite; }
        .loading-text { color: rgba(255,255,255,0.8); font-family: 'Inter', sans-serif; font-size: 0.9rem; font-weight: 500; }
        .loading-bar {
            width: 200px;
            height: 3px;
            background: rgba(255,255,255,0.15);
            border-radius: 2px;
            margin-top: 1.5rem;
            overflow: hidden;
        }
        .loading-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #7c3aed, #db2777);
            border-radius: 2px;
            animation: loadBar 1.8s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
        @keyframes loadBar { 0%{width:0;margin-left:0} 50%{width:100%;margin-left:0} 100%{width:0;margin-left:100%} }

        #blazor-error-ui {
            display: none !important;
        }
    </style>
</head>

<body>
    <div id="loading-screen">
        <div class="loading-logo">🎫</div>
        <div class="loading-text">Carregando Bilheteria Virtual...</div>
        <div class="loading-bar"><div class="loading-bar-fill"></div></div>
    </div>

    <div id="app"></div>

    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        // Remove loading screen when Blazor is ready
        window.addEventListener('load', function () {
            setTimeout(function () {
                var ls = document.getElementById('loading-screen');
                if (ls) { ls.style.opacity = '0'; setTimeout(function(){ ls.remove(); }, 400); }
            }, 800);
        });
    </script>
</body>

</html>
